<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Cloudflare 文件管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #f6f7f9;
      --card: #ffffff;
      --primary: #0051ff;
      --danger: #e5484d;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                   Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 820px;
      margin: 40px auto;
      padding: 0 16px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 16px;
    }

    .card {
      background: var(--card);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.04);
    }

    label {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
      color: var(--muted);
    }

    input[type="text"],
    input[type="file"] {
      width: 100%;
      padding: 10px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      font-size: 14px;
    }

    button {
      margin-top: 12px;
      padding: 10px 16px;
      border-radius: 6px;
      border: none;
      background: var(--primary);
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }

    button:disabled {
      background: #a5b4fc;
      cursor: not-allowed;
    }

    .status {
      margin-top: 10px;
      font-size: 14px;
    }

    .success { color: #16a34a; }
    .error { color: var(--danger); }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid var(--border);
      text-align: left;
    }

    th {
      color: var(--muted);
      font-weight: 500;
    }

    .actions button {
      background: transparent;
      color: var(--danger);
      padding: 0;
    }

    .progress {
      height: 6px;
      background: #e5e7eb;
      border-radius: 3px;
      overflow: hidden;
      margin-top: 10px;
    }

    .progress div {
      height: 100%;
      background: var(--primary);
      width: 0%;
      transition: width .2s;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>📁 文件管理</h1>

  <!-- Token -->
  <div class="card">
    <label>访问 Token</label>
    <input id="tokenInput" type="text" placeholder="请输入 Token" />
    <button onclick="verifyToken()">验证 Token</button>
    <div id="authStatus" class="status"></div>
  </div>

  <!-- Upload -->
  <div class="card" id="uploadCard" style="display:none">
    <label>选择文件（≤100MB）</label>
    <input type="file" id="fileInput" />
    <button onclick="upload()">上传文件</button>
    <div class="progress"><div id="progressBar"></div></div>
    <div id="uploadStatus" class="status"></div>
  </div>

  <!-- Files -->
  <div class="card" id="filesCard" style="display:none">
    <h3>文件列表</h3>
    <table>
      <thead>
        <tr>
          <th>文件名</th>
          <th>大小</th>
          <th>时间</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="fileList"></tbody>
    </table>
  </div>
</div>

<script>
  const chunkSize = 5 * 1024 * 1024
  let token = sessionStorage.getItem('token')

  if (token) unlock()

  async function verifyToken() {
    const t = tokenInput.value.trim()
    if (!t) return

    const res = await fetch('/files', {
      headers: { Authorization: 'Bearer ' + t }
    })

    if (res.ok) {
      token = t
      sessionStorage.setItem('token', token)
      unlock()
      authStatus.textContent = '鉴权成功'
      authStatus.className = 'status success'
    } else {
      authStatus.textContent = 'Token 无效'
      authStatus.className = 'status error'
    }
  }

  function unlock() {
    uploadCard.style.display = ''
    filesCard.style.display = ''
    loadFiles()
  }

  async function upload() {
    const file = fileInput.files[0]
    if (!file) return

    const init = await fetch('/upload/init', {
      method: 'POST',
      headers: {
        Authorization: 'Bearer ' + token,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ name: file.name, size: file.size })
    }).then(r => r.json())

    for (let i = 0; i < init.chunks; i++) {
      const chunk = file.slice(i * chunkSize, (i + 1) * chunkSize)
      await fetch('/upload/chunk', {
        method: 'POST',
        headers: {
          Authorization: 'Bearer ' + token
        },
        body: (() => {
          const f = new FormData()
          f.append('uploadId', init.uploadId)
          f.append('index', i)
          f.append('chunk', chunk)
          return f
        })()
      })
      progressBar.style.width = `${((i + 1) / init.chunks) * 100}%`
    }

    await fetch('/upload/complete', {
      method: 'POST',
      headers: {
        Authorization: 'Bearer ' + token,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ uploadId: init.uploadId })
    })

    uploadStatus.textContent = '上传完成'
    uploadStatus.className = 'status success'
    loadFiles()
  }

  async function loadFiles() {
    const res = await fetch('/files', {
      headers: { Authorization: 'Bearer ' + token }
    })
    const data = await res.json()
    fileList.innerHTML = ''

    Object.entries(data).forEach(([id, f]) => {
      const tr = document.createElement('tr')
      tr.innerHTML = `
        <td>${f.name}</td>
        <td>${(f.size / 1024 / 1024).toFixed(2)} MB</td>
        <td>${new Date(f.createdAt * 1000).toLocaleString()}</td>
        <td class="actions">
          <button onclick="del('${id}')">删除</button>
        </td>`
      fileList.appendChild(tr)
    })
  }

  async function del(id) {
    if (!confirm('确认删除？')) return
    await fetch('/delete/' + id, {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + token }
    })
    loadFiles()
  }
</script>
</body>
</html>
