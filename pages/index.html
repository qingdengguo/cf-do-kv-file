<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Cloudflare 文件管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #f6f7f9;
      --card: #ffffff;
      --primary: #0051ff;
      --danger: #e5484d;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .container { max-width: 820px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 24px; margin-bottom: 16px; }
    .card { background: var(--card); border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.04); }
    label { display: block; font-size: 14px; margin-bottom: 6px; color: var(--muted); }
    input[type="text"], input[type="file"] { width: 100%; padding: 10px 12px; border-radius: 6px; border: 1px solid var(--border); font-size: 14px; }
    button { margin-top: 12px; padding: 10px 16px; border-radius: 6px; border: none; background: var(--primary); color: #fff; font-size: 14px; cursor: pointer; }
    button:disabled { background: #a5b4fc; cursor: not-allowed; }
    .status { margin-top: 10px; font-size: 14px; }
    .success { color: #16a34a; }
    .error { color: var(--danger); }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 10px; border-bottom: 1px solid var(--border); text-align: left; }
    th { color: var(--muted); font-weight: 500; }
    .actions button { background: transparent; color: var(--danger); padding: 0; margin: 0; }
    .progress { height: 6px; background: #e5e7eb; border-radius: 3px; overflow: hidden; margin-top: 10px; }
    .progress div { height: 100%; background: var(--primary); width: 0%; transition: width .2s; }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="container">
  <h1>📁 Cloudflare 边缘文件管理</h1>

  <div class="card">
    <label>访问 Token</label>
    <input id="tokenInput" type="text" placeholder="请输入 Token" />
    <button id="verifyBtn" onclick="verifyToken()">验证 Token</button>
    <div id="authStatus" class="status"></div>
  </div>

  <div class="card" id="uploadCard" style="display:none">
    <label>选择文件（二进制流式切片，支持无上限大文件）</label>
    <input type="file" id="fileInput" />
    <button id="uploadBtn" onclick="upload()">上传文件</button>
    <div class="progress"><div id="progressBar"></div></div>
    <div id="uploadStatus" class="status"></div>
  </div>

  <div class="card" id="filesCard" style="display:none">
    <h3>文件列表 (点击文件名即可下载)</h3>
    <table>
      <thead>
        <tr>
          <th>文件名</th>
          <th>大小</th>
          <th>上传时间</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="fileList"></tbody>
    </table>
  </div>
</div>

<script>
  const chunkSize = 5 * 1024 * 1024; // 5MB 
  let token = sessionStorage.getItem('token');

  if (token) {
    document.getElementById('tokenInput').value = token;
    unlock();
  }

  async function verifyToken() {
    const t = document.getElementById('tokenInput').value.trim();
    if (!t) return;
    try {
      const res = await fetch('/files', { headers: { Authorization: 'Bearer ' + t } });
      if (res.ok) {
        token = t;
        sessionStorage.setItem('token', token);
        unlock();
        document.getElementById('authStatus').textContent = '验证成功';
        document.getElementById('authStatus').className = 'status success';
      } else {
        alert('Token 验证失败');
      }
    } catch { alert('无法连接边缘服务器'); }
  }

  function unlock() {
    document.getElementById('uploadCard').style.display = '';
    document.getElementById('filesCard').style.display = '';
    loadFiles();
  }

  // 🌟 上传主函数：修改为了纯二进制流发送模式
  async function upload() {
    const fileInput = document.getElementById('fileInput');
    const uploadStatus = document.getElementById('uploadStatus');
    const progressBar = document.getElementById('progressBar');
    const uploadBtn = document.getElementById('uploadBtn');
    
    const file = fileInput.files[0];
    if (!file) { alert('请先选择文件'); return; }

    uploadBtn.disabled = true;
    progressBar.style.width = '0%';
    uploadStatus.textContent = '正在初始化上传单单...';

    try {
      // 1. 初始化分配 UploadId 
      const initRes = await fetch('/upload/init', {
        method: 'POST',
        headers: {
          Authorization: 'Bearer ' + token,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ name: file.name, size: file.size, type: file.type || 'application/octet-stream' })
      });
      if (!initRes.ok) throw new Error('初始化任务失败');
      const init = await initRes.json();

      // 2. 循环二进制切片直接投递
      for (let i = 0; i < init.chunks; i++) {
        uploadStatus.textContent = `发送分片 (${i + 1}/${init.chunks})...`;
        const chunk = file.slice(i * chunkSize, (i + 1) * chunkSize);
        
        // 🌟 核心修改点：丢弃 FormData，直接在 Body 投递二进制 blob，并指明 Content-Type
        const chunkRes = await fetch(`/upload/chunk?uploadId=${init.uploadId}&index=${i}`, {
          method: 'POST',
          headers: {
            Authorization: 'Bearer ' + token,
            'Content-Type': 'application/octet-stream' 
          },
          body: chunk 
        });

        if (!chunkRes.ok) throw new Error(`分片 ${i + 1} 传输故障`);
        progressBar.style.width = `${((i + 1) / init.chunks) * 100}%`;
      }

      // 3. 收拢合并
      uploadStatus.textContent = '拼合分片并封存...';
      const compRes = await fetch('/upload/complete', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ uploadId: init.uploadId })
      });
      if (!compRes.ok) throw new Error('封存归档故障');

      uploadStatus.textContent = '文件成功落盘！';
      uploadStatus.className = 'status success';
      fileInput.value = '';
      loadFiles();

    } catch (err) {
      uploadStatus.textContent = err.message;
      uploadStatus.className = 'status error';
    } finally { uploadBtn.disabled = false; }
  }

  async function loadFiles() {
    const fileList = document.getElementById('fileList');
    try {
      const res = await fetch('/files', { headers: { Authorization: 'Bearer ' + token } });
      const data = await res.json();
      fileList.innerHTML = '';
      const entries = Object.entries(data);
      if (entries.length === 0) {
        fileList.innerHTML = '<tr><td colspan="4" style="text-align:center;">库中尚无文件</td></tr>';
        return;
      }
      entries.forEach(([id, f]) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><a href="/download/${id}" target="_blank">📄 ${f.fileName}</a></td>
          <td>${(f.size / 1024 / 1024).toFixed(2)} MB</td>
          <td>${new Date(f.createdAt * 1000).toLocaleString()}</td>
          <td class="actions"><button onclick="del('${id}')">删除</button></td>`;
        fileList.appendChild(tr);
      });
    } catch {}
  }

  async function del(id) {
    if (confirm('确定彻底清除该文件？')) {
      await fetch('/delete/' + id, { method: 'POST', headers: { Authorization: 'Bearer ' + token } });
      loadFiles();
    }
  }
</script>
</body>
</html>
